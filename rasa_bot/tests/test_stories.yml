stories:
  - story: crear evento completo y confirmar
    steps:
      - user: |
          anotame un parcial para mañana a las 9
        intent: crear_evento
      - action: action_validar_y_crear_evento
      - user: |
          si
        intent: affirm
      - action: action_confirmar_creacion_evento

  - story: crear evento con agenda faltante y confirmar
    steps:
      - user: |
          agendame una reunión para mañana a las 10
        intent: crear_evento
      - action: action_validar_y_crear_evento
      - user: |
          en trabajo
        intent: informar_agenda
      - action: action_validar_y_crear_evento
      - user: |
          si
        intent: affirm
      - action: action_confirmar_creacion_evento

  - story: cancelar borrador
    steps:
      - user: |
          anotame dentista para el jueves
        intent: crear_evento
      - action: action_validar_y_crear_evento
      - user: |
          no
        intent: deny
      - action: action_cancelar_operacion

  - story: consultar por filtros basicos
    steps:
      - user: |
          qué reuniones tengo mañana en trabajo
        intent: consultar_evento
      - action: action_consultar_evento

  - story: consultar esta semana
    steps:
      - user: |
          qué tengo esta semana
        intent: consultar_evento
      - action: action_consultar_evento

  - story: responder chitchat
    steps:
      - user: |
          hola
        intent: chitchat
      - action: action_handle_chitchat

  - story: manejar fallback
    steps:
      - user: |
          blabla rarisimo
        intent: nlu_fallback
      - action: action_handle_fallback
