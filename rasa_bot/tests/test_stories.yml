stories:
- story: crear evento dispara accion
  steps:
  - user: |
      anotame un parcial para manana
    intent: crear_evento
  - action: action_validar_y_crear_evento

- story: consultar evento dispara accion
  steps:
  - user: |
      que tengo manana
    intent: consultar_evento
  - action: action_consultar_evento

- story: responder chitchat
  steps:
  - user: |
      hola
    intent: chitchat
  - action: action_handle_chitchat

- story: continuar creacion al informar agenda
  steps:
  - user: |
      en la agenda personal
    intent: informar_agenda
  - action: action_validar_y_crear_evento
