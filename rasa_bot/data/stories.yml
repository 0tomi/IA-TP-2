version: "3.1"

stories:
  - story: crear evento interactivo y confirmar
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_preparar_confirmacion
      - intent: affirm
      - action: action_confirmar_creacion_evento

  - story: crear evento, elegir agenda o duracion y confirmar
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form
      - intent: informar_agenda
      - action: evento_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_preparar_confirmacion
      - intent: affirm
      - action: action_confirmar_creacion_evento

  - story: crear evento con correccion antes de confirmar
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form
      - intent: corregir_evento
      - action: evento_form
      - active_loop: null
      - slot_was_set:
          - requested_slot: null
      - action: action_preparar_confirmacion
      - intent: affirm
      - action: action_confirmar_creacion_evento

  - story: crear evento y cancelar
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form
      - intent: deny
      - action: action_cancelar_operacion

  - story: consultar eventos por filtros
    steps:
      - intent: consultar_evento
      - action: action_consultar_evento

  - story: responder chitchat
    steps:
      - intent: chitchat
      - action: action_handle_chitchat

  - story: manejar fallback real
    steps:
      - intent: nlu_fallback
      - action: action_handle_fallback
