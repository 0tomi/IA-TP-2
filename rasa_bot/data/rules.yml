version: "3.1"

rules:


- rule: Derivar a chitchat por defecto (fallback)
  steps:
  - intent: nlu_fallback
  - action: action_handle_chitchat
- rule: Responder a chitchat
  steps:
  - intent: chitchat
  - action: action_handle_chitchat

- rule: Crear nuevo evento
  steps:
  - intent: crear_evento
  - action: action_validar_y_crear_evento

- rule: Consultar eventos
  steps:
  - intent: consultar_evento
  - action: action_consultar_evento

- rule: Continuar creando evento tras informar agenda
  steps:
  - intent: informar_agenda
  - action: action_validar_y_crear_evento
