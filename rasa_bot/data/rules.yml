version: "3.1"

rules:
  - rule: Manejar fallback real
    steps:
      - intent: nlu_fallback
      - action: action_handle_fallback

  - rule: Responder a chitchat
    steps:
      - intent: chitchat
      - action: action_handle_chitchat

  - rule: Activar formulario de creación de evento
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form

  - rule: Submit exitoso del formulario de evento
    condition:
      - active_loop: evento_form
    steps:
      - action: evento_form
      - active_loop: null
      - action: action_preparar_confirmacion

  - rule: Recalcular borrador cuando corrigen datos en form
    condition:
      - active_loop: evento_form
    steps:
      - intent: corregir_evento
      - action: evento_form
      - active_loop: evento_form

  - rule: Confirmar creacion de evento
    steps:
      - intent: affirm
      - action: action_confirmar_creacion_evento

  - rule: Cancelar operacion por negativa
    steps:
      - intent: deny
      - action: action_cancelar_operacion

  - rule: Cancelar operacion explicitamente
    steps:
      - intent: cancelar
      - action: action_cancelar_operacion

  - rule: Consultar eventos
    steps:
      - intent: consultar_evento
      - action: action_consultar_evento
