version: "3.1"

rules:
  - rule: Manejar fallback real
    steps:
      - intent: nlu_fallback
      - action: action_handle_fallback

  - rule: Responder a chitchat
    steps:
      - intent: chitchat
      - action: action_handle_chitchat

  - rule: Activar formulario de creación de evento
    steps:
      - intent: crear_evento
      - action: evento_form
      - active_loop: evento_form

  - rule: Submit exitoso del formulario de evento
    condition:
      - active_loop: evento_form
    steps:
      - action: evento_form
      - active_loop: null
      - action: action_preparar_confirmacion

  - rule: Recalcular borrador cuando corrigen datos en form
    condition:
      - active_loop: evento_form
    steps:
      - intent: corregir_evento
      - action: evento_form
      - active_loop: evento_form

  - rule: Completar detalle dentro del formulario de evento
    condition:
      - active_loop: evento_form
    steps:
      - intent: informar_detalle_evento
      - action: evento_form
      - active_loop: evento_form

  - rule: Completar duracion dentro del formulario de evento
    condition:
      - active_loop: evento_form
    steps:
      - intent: informar_duracion
      - action: evento_form
      - active_loop: evento_form

  - rule: Recalcular borrador cuando corrigen antes de confirmar
    condition:
      - slot_was_set:
          - awaiting_confirmation: true
    steps:
      - intent: corregir_evento
      - action: action_preparar_confirmacion

  - rule: Consultar eventos interrumpiendo creacion
    condition:
      - active_loop: evento_form
    steps:
      - intent: consultar_evento
      - action: action_consultar_evento

  - rule: Submit exitoso del formulario de consulta
    condition:
      - active_loop: consulta_form
    steps:
      - action: consulta_form
      - active_loop: null
      - action: action_consultar_evento

  - rule: Confirmar creacion de evento
    steps:
      - intent: affirm
      - action: action_confirmar_creacion_evento

  - rule: Manejar negativa durante confirmacion
    condition:
      - slot_was_set:
          - awaiting_confirmation: true
    steps:
      - intent: deny
      - action: action_handle_denial_with_correction

  - rule: Cancelar operacion por negativa
    steps:
      - intent: deny
      - action: action_cancelar_operacion

  - rule: Consultar tipos de evento
    steps:
      - intent: consultar_tipos_evento
      - action: action_consultar_tipos_evento

  - rule: Cancelar operacion explicitamente
    steps:
      - intent: cancelar
      - action: action_cancelar_operacion

  - rule: Consultar eventos
    steps:
      - intent: consultar_evento
      - action: action_consultar_evento
