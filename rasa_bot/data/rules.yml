version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Responder a chitchat
  steps:
  - intent: chitchat
  - action: action_handle_chitchat

- rule: Crear nuevo evento
  steps:
  - intent: crear_evento
  - action: action_validar_y_crear_evento

- rule: Consultar eventos
  steps:
  - intent: consultar_evento
  - action: action_consultar_evento
