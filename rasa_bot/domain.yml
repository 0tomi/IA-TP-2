version: "3.1"

intents:
  - crear_evento
  - consultar_evento
  - consultar_tipos_evento
  - chitchat
  - informar_agenda
  - informar_detalle_evento
  - informar_duracion
  - corregir_evento
  - affirm
  - deny
  - cancelar

entities:
  - tipo_evento
  - nombre_evento
  - fecha
  - nombre_agenda
  - duracion

slots:
  tipo_evento:
    type: text
    mappings:
      - type: from_entity
        entity: tipo_evento
      - type: from_text
        conditions:
          - active_loop: evento_form
            requested_slot: tipo_evento

  nombre_evento:
    type: text
    mappings:
      - type: from_entity
        entity: nombre_evento
      - type: from_text
        conditions:
          - active_loop: evento_form
            requested_slot: nombre_evento
      - type: custom

  nombre_agenda:
    type: text
    mappings:
      - type: from_entity
        entity: nombre_agenda

  fecha_evento:
    type: text
    mappings:
      - type: from_entity
        entity: fecha
      - type: from_text
        conditions:
          - active_loop: evento_form
            requested_slot: fecha_evento
          - active_loop: consulta_form
            requested_slot: fecha_evento

  duracion_texto:
    type: text
    mappings:
      - type: from_entity
        entity: duracion

  duracion_minutos:
    type: float
    mappings:
      - type: custom

  requested_slot:
    type: text
    mappings:
      - type: custom

  awaiting_confirmation:
    type: bool
    initial_value: false
    mappings:
      - type: custom

  pending_action:
    type: text
    mappings:
      - type: custom

  chitchat_count:
    type: float
    initial_value: 0
    mappings:
      - type: custom

actions:
  - validate_evento_form
  - validate_consulta_form
  - action_preparar_confirmacion
  - action_confirmar_creacion_evento
  - action_consultar_evento
  - action_consultar_tipos_evento
  - action_ask_evento_form_tipo_evento
  - action_ask_evento_form_nombre_evento
  - action_handle_chitchat
  - action_handle_fallback
  - action_handle_denial_with_correction
  - action_cancelar_operacion

forms:
  evento_form:
    ignored_intents:
      - chitchat
      - cancelar
      - deny
      - consultar_evento
    required_slots:
      - tipo_evento
      - nombre_evento
      - fecha_evento
  consulta_form:
    ignored_intents:
      - chitchat
      - cancelar
      - deny
      - crear_evento
    required_slots:
      - fecha_evento

responses:
  utter_ask_tipo_evento:
    - text: "¿Qué tipo de evento querés agendar? (Ejemplo: parcial, reunión o turno médico)"
  utter_ask_fecha_evento:
    - text: "¿Para cuándo lo querés agendar? (Ejemplo: mañana a las 18, o el viernes a la mañana)"
  utter_ask_nombre_agenda:
    - text: "Tenés varias agendas guardadas. ¿En cuál querés que lo anote?"
  utter_ask_consulta_form_fecha_evento:
    - text: "¿Para qué día querés consultar la agenda? (Ejemplo: hoy, mañana o el viernes)"

session_config:
  session_expiration_time: 10
  carry_over_slots_to_new_session: false
