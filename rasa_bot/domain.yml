version: "3.1"

intents:
  - crear_evento
  - consultar_evento
  - chitchat

entities:
  - tipo_evento
  - fecha

slots:
  tipo_evento:
    type: text
    mappings:
    - type: from_entity
      entity: tipo_evento
  fecha_evento:
    type: text
    mappings:
    - type: from_entity
      entity: fecha
  chitchat_count:
    type: float
    initial_value: 0
    mappings:
    - type: custom

actions:
  - action_validar_y_crear_evento
  - action_consultar_evento
  - action_handle_chitchat



session_config:
  session_expiration_time: 10
  carry_over_slots_to_new_session: false
